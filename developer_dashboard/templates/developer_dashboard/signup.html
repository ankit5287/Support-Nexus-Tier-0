{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Provisioning — Nexus</title>
    <link rel="stylesheet" href="{% static 'css/enterprise.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #050810;
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            padding: 44px 40px;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="auth-card nx-card anim-fade-up">
            <a href="/" class="nx-logo" style="display:block;margin-bottom:28px;">Nexus<span class="nx-logo-dot"></span></a>
            <h1 class="heading-md" style="margin-bottom:8px;">Create Account</h1>
            <p class="body-sm" style="margin-bottom:30px;">Provision a new account within the Nexus ecosystem.</p>

            {% if error %}
            <div class="alert alert-error" style="margin-bottom:20px;">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'dev_signup' %}">
                {% csrf_token %}
                <div class="nx-field">
                    <label class="nx-label">Username</label>
                    <input type="text" name="username" class="nx-input" placeholder="Nexus ID" required autocomplete="username">
                </div>
                <div class="nx-field">
                    <label class="nx-label">Email</label>
                    <input type="email" name="email" class="nx-input" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="nx-field">
                    <label class="nx-label">Password</label>
                    <input type="password" name="password" class="nx-input" placeholder="At least 6 characters" required
                        autocomplete="new-password">
                </div>
                <div class="nx-field" style="margin-bottom:28px;">
                    <label class="nx-label">Confirm Password</label>
                    <input type="password" name="password2" class="nx-input" placeholder="Re-enter password" required
                        autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            
            <div class="nx-divider" style="margin:24px 0;"></div>
            
            <div style="text-align:center;font-size:0.85rem;color:var(--text-3);">
                Already have an account? <a href="{% url 'dev_login' %}" style="color:var(--accent-blue);text-decoration:none;">Sign in →</a>
            </div>
        </div>
    </div>
</body>

</html>
