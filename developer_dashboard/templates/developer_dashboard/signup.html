<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Nexus Quantum</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .signup-container {
            width: 100%;
            max-width: 460px;
            padding: 40px;
            text-align: center;
        }

        .brand-icon { font-size: 3rem; margin-bottom: 20px; display: block; }
        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 10px; }
        p.subtitle { color: #86868b; margin-bottom: 35px; font-size: 1rem; }

        .input-group { margin-bottom: 25px; text-align: left; }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        input:focus { border-color: #0066cc; box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1); }

        .btn-submit {
            background-color: #0066cc;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover { background-color: #0077ee; }

        .error-message {
            background-color: #fff2f1;
            border: 1px solid #ffa39e;
            color: #d70015;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .footer-links {
            margin-top: 30px;
            border-top: 1px solid #d2d2d7;
            padding-top: 20px;
            font-size: 0.85rem;
            color: #86868b;
        }
        .footer-links a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-container">
    <span class="brand-icon">⚛️</span>
    <h1>Create Your Account</h1>
    <p class="subtitle">Manage your devices and get expert help with one account.</p>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'dev_signup' %}">
        {% csrf_token %}
        <div class="input-group">
            <input type="text" name="username" placeholder="Choose a username" required autocomplete="username">
            <input type="email" name="email" placeholder="Email address" required autocomplete="email">
            <input type="password" name="password" placeholder="Create password (min 6 chars)" required autocomplete="new-password">
            <input type="password" name="password2" placeholder="Confirm password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit">Sign Up</button>
    </form>

    <div class="footer-links">
        Already have an account? <a href="{% url 'dev_login' %}">Sign In</a>
    </div>
</div>

</body>
</html>
