<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Auth | Support Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #58a6ff;
            font-weight: 800;
        }
        p {
            color: #8b949e;
            font-size: 0.9em;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #58a6ff;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2ea043;
        }
        .error {
            color: #ff7b72;
            background-color: rgba(255, 123, 114, 0.1);
            border: 1px solid rgba(255, 123, 114, 0.4);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .shield-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="shield-icon">🔐</div>
    <h2>Nexus Security Portal</h2>
    <p>Authorized Tier 3 Engineers Only</p>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'dev_login' %}">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username / SSO ID" required>
        <input type="password" name="password" placeholder="Passcode" required>
        <button type="submit">Authenticate</button>
    </form>
    <div style="margin-top: 20px; font-size: 0.8em; color: #8b949e;">
        <p>Enterprise Zero-Trust Network enabled.</p>
    </div>
</div>

</body>
</html>
