<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Support Nexus</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent-blue: #63b3ed;
            --accent-violet: #a78bfa;
            --accent-teal: #4fd1c5;
            --text-1: #f0f6fc;
            --text-2: #8b9ab0;
            --text-3: #4a5568;
            --border-subtle: rgba(255, 255, 255, 0.07);
            --bg-card: rgba(255, 255, 255, 0.06);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050810;
            color: var(--text-1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 15% 20%, rgba(99, 179, 237, 0.09) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 85% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 60%), #050810;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 48px 44px;
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
            animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            display: block;
            text-decoration: none;
        }

        h1 {
            font-family: 'Sora', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .sub {
            color: var(--text-2);
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        .label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-2);
            margin-bottom: 7px;
        }

        .field {
            margin-bottom: 18px;
        }

        input[type=text],
        input[type=password],
        input[type=email] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-1);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input::placeholder {
            color: var(--text-3);
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.15);
            background: rgba(99, 179, 237, 0.04);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 24px rgba(99, 179, 237, 0.3);
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(99, 179, 237, 0.45);
        }

        .error {
            background: rgba(252, 129, 129, 0.08);
            border: 1px solid rgba(252, 129, 129, 0.3);
            color: #fc8181;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer {
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.8rem;
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: opacity .2s;
        }

        .footer a:hover {
            opacity: .7;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-3);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>
    <div class="card">
        <a href="/" class="logo">Support Nexus</a>
        <h1>Welcome back</h1>
        <p class="sub">Sign in to your Nexus account.</p>

        {% if error %}
        <div class="error">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'dev_login' %}">
            {% csrf_token %}
            <div class="field">
                <label class="label">Username</label>
                <input type="text" name="username" placeholder="your-nexus-id" required autocomplete="username">
            </div>
            <div class="field">
                <label class="label">Password</label>
                <input type="password" name="password" placeholder="••••••••••" required
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="footer">
            <a href="#">Forgot password?</a>
            <a href="{% url 'dev_signup' %}">Create account →</a>
        </div>
    </div>
</body>

</html>
