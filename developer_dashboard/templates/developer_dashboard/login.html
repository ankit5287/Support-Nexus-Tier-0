{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Access — Nexus</title>
    <link rel="stylesheet" href="{% static 'css/enterprise.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #050810;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="auth-card nx-card anim-fade-up">
            <a href="/" class="nx-logo" style="display:block;margin-bottom:32px;">Nexus<span class="nx-logo-dot"></span></a>
            <h1 class="heading-md" style="margin-bottom:8px;">Welcome back</h1>
            <p class="body-sm" style="margin-bottom:36px;">Sign in to the Nexus Global Operations Hub.</p>

            {% if error %}
            <div class="alert alert-error" style="margin-bottom:24px;">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'dev_login' %}">
                {% csrf_token %}
                <div class="nx-field">
                    <label class="nx-label">Username</label>
                    <input type="text" name="username" class="nx-input" placeholder="Nexus ID" required autocomplete="username">
                </div>
                <div class="nx-field" style="margin-bottom:28px;">
                    <label class="nx-label">Password</label>
                    <input type="password" name="password" class="nx-input" placeholder="••••••••••" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <div class="nx-divider" style="margin:24px 0;"></div>
            
            <div style="display:flex;justify-content:center;gap:20px;font-size:0.85rem;">
                <a href="#" style="color:var(--text-3);text-decoration:none;">Forgot password?</a>
                <a href="{% url 'dev_signup' %}" style="color:var(--accent-blue);text-decoration:none;">Create account →</a>
            </div>
        </div>
    </div>
</body>

</html>
