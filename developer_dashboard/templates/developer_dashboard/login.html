{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication — Nexus Global</title>
    <link rel="stylesheet" href="{% static 'css/enterprise.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 1px solid var(--border-subtle);
            background: #000;
        }
    </style>
</head>

<body style="opacity:0; transition: opacity 0.5s;">
    <div class="auth-container anim-liquid-fade">
        <a href="/" class="nx-logo" style="display:block;margin-bottom:48px;">Nexus<span class="nx-logo-dot">.</span>Global</a>
        
        <div style="margin-bottom:32px;">
            <h1 class="heading-md" style="font-size:1.5rem; margin-bottom:8px;">Operational Gateway</h1>
            <p class="body-sm">Identity Verification Required</p>
        </div>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom:32px; border-radius:2px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'dev_login' %}">
            {% csrf_token %}
            <div class="nx-field">
                <label class="nx-label">Identifier</label>
                <input type="text" name="username" class="nx-input" placeholder="Nexus ID" required autocomplete="username">
            </div>
            <div class="nx-field" style="margin-bottom:32px;">
                <label class="nx-label">Credential</label>
                <input type="password" name="password" class="nx-input" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%; height:50px; font-weight:700;">
                Authorize Session
            </button>
        </form>

        <div style="margin-top:40px; text-align:center; border-top: 1px solid var(--border-subtle); padding-top:24px;">
            <p class="body-sm">Unsecured Access Prohibited<br>
            <a href="{% url 'dev_signup' %}" style="color:var(--accent-blue); text-decoration:none; display:inline-block; margin-top:12px;">Create Credentials</a>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '1';
        });
    </script>
</body>

</html>
